<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UI Layout — Chart + 3 Big Icon Tabs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Phone frame */
        .phone {
            width: 390px;
            height: 844px;
            background: #121212;
            border-radius: 44px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 30px 40px rgba(0,0,0,0.5), 0 0 0 6px #1e1e1e;
        }

        /* Scrollable content */
        .content {
            height: calc(100% - 74px);
            overflow-y: auto;
            padding: 20px 16px;
            scrollbar-width: thin;
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-track {
            background: #2D2D2D;
        }

        .content::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 10px;
        }

        /* Status bar placeholder */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: #121212;
            color: white;
            font-size: 15px;
            font-weight: 600;
        }

        /* ===== CHART SECTION ===== */
        .chart-container {
            background: #1E1E1E;
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 24px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
        }

        .chart-header h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trend-badge {
            background: rgba(76,175,80,0.15);
            color: #4CAF50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .chart-area {
            background: #252525;
            border-radius: 20px;
            padding: 16px 8px 12px;
        }

        /* Bar chart */
        .bars-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 150px;
            gap: 8px;
        }

        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .bar {
            width: 100%;
            max-width: 38px;
            background: linear-gradient(0deg, #2E7D32, #66BB6A);
            border-radius: 12px;
            transition: height 0.3s ease;
        }

        .day-label {
            color: #888;
            font-size: 10px;
            font-weight: 500;
        }

        /* Line chart overlay */
        .line-trend {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #333;
        }

        .trend-svg {
            width: 100%;
            height: 48px;
        }

        .chart-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 14px;
            color: #aaa;
            font-size: 11px;
        }

        /* Placeholder for other UI (chats would go here) */
        .placeholder-text {
            color: #555;
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
        }

        /* ===== BOTTOM TAB BAR — 3 BIG ICONS ===== */
        .bottom-bar {
            background: #0F0F0F;
            backdrop-filter: blur(12px);
            display: flex;
            height: 74px;
            border-top: 0.5px solid #2D2D2D;
        }

        .tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #1E1E1E;
        }

        .tab-icon {
            width: 48px;
            height: 48px;
            background: #2D2D2D;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            transition: all 0.2s;
        }

        .tab.active .tab-icon {
            background: #4CAF50;
            box-shadow: 0 2px 14px rgba(76,175,80,0.4);
        }

        .tab-label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
        }

        .tab.active .tab-label {
            color: #4CAF50;
        }

        .home-indicator {
            width: 140px;
            height: 5px;
            background: #555;
            border-radius: 100px;
            margin: 8px auto 6px;
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span>9:41</span>
        <span>📶 🔋</span>
    </div>

    <div class="content">
        <!-- CHART LAYOUT — placed right at the top as requested -->
        <div class="chart-container">
            <div class="chart-header">
                <h3>📊 Weekly Activity</h3>
                <div class="trend-badge">▲ +8.2%</div>
            </div>
            <div class="chart-area">
                <!-- Bar Chart -->
                <div class="bars-container" id="barChart"></div>
                
                <!-- Line Chart overlay -->
                <div class="line-trend">
                    <svg class="trend-svg" viewBox="0 0 340 40" preserveAspectRatio="none">
                        <polyline points="20,32 60,27 100,16 140,22 180,30 220,36 270,10 320,14"
                                  fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="20" cy="32" r="3" fill="#4CAF50"/>
                        <circle cx="100" cy="16" r="3" fill="#4CAF50"/>
                        <circle cx="270" cy="10" r="4.5" fill="#76FF03" stroke="#1E1E1E" stroke-width="1.5"/>
                        <circle cx="320" cy="14" r="3" fill="#4CAF50"/>
                    </svg>
                </div>
                
                <div class="chart-stats">
                    <span>📈 +245 interactions</span>
                    <span>🏆 Peak: Sunday</span>
                </div>
            </div>
        </div>

        <!-- Simple placeholder — this is where your chat UI would live -->
        <div class="placeholder-text">
            ↓ Your chats would appear here ↓
        </div>
    </div>

    <!-- BOTTOM BAR — 3 TABS WITH BIG ICONS -->
    <div class="bottom-bar">
        <div class="tab active" data-tab="chats">
            <div class="tab-icon">💬</div>
            <span class="tab-label">Chats</span>
        </div>
        <div class="tab" data-tab="updates">
            <div class="tab-icon">📰</div>
            <span class="tab-label">Updates</span>
        </div>
        <div class="tab" data-tab="communities">
            <div class="tab-icon">👥</div>
            <span class="tab-label">Communities</span>
        </div>
    </div>
    <div class="home-indicator"></div>
</div>

<script>
    // Render bar chart with nice animation
    const days = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
    const values = [28, 52, 78, 62, 41, 26, 98];
    const maxHeight = 108;
    
    const container = document.getElementById('barChart');
    container.innerHTML = '';
    
    values.forEach((val, i) => {
        const height = Math.max(20, (val / 100) * maxHeight);
        const wrapper = document.createElement('div');
        wrapper.className = 'bar-wrapper';
        wrapper.innerHTML = `
            <div class="bar" style="height: ${height}px; width: 34px;"></div>
            <div class="day-label">${days[i]}</div>
        `;
        container.appendChild(wrapper);
    });
    
    // Simple tab switching (just UI demo)
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const tabId = tab.getAttribute('data-tab');
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            console.log(`Switched to: ${tabId}`);
        });
    });
</script>
</body>
</html>
